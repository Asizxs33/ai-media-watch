<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Generate Icons</title>
<style>
  body { background: #111; color: #ccc; font-family: sans-serif; padding: 24px; }
  canvas { border: 1px solid #333; margin: 8px; }
  .btn {
    display: inline-block; margin: 4px; padding: 8px 16px;
    background: #a855f7; color: #fff; border: none; border-radius: 8px;
    cursor: pointer; font-weight: 700; font-size: 13px;
  }
</style>
</head>
<body>
<h3 style="color:#a855f7; margin-bottom:16px">Spectra AI — Icon Generator</h3>
<p style="margin-bottom:16px; font-size:13px">Нажми кнопку, иконки скачаются автоматически как icon48.png и icon128.png</p>
<button class="btn" onclick="generateAll()">Скачать иконки</button>
<br><br>
<canvas id="c48" width="48" height="48"></canvas>
<canvas id="c128" width="128" height="128"></canvas>

<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');
  const r = s * 0.18;

  // Background — dark purple
  const bg = ctx.createLinearGradient(0, 0, s, s);
  bg.addColorStop(0, '#1a0a2e');
  bg.addColorStop(1, '#0e0814');
  ctx.fillStyle = bg;
  roundRect(ctx, 0, 0, s, s, r);
  ctx.fill();

  // Prism triangle
  const pad = s * 0.12;
  const tx = s * 0.5;   // apex x
  const ty = s * 0.1;   // apex y
  const bl = { x: pad, y: s * 0.88 };   // bottom-left
  const br = { x: s - pad, y: s * 0.88 };  // bottom-right

  const prismGrad = ctx.createLinearGradient(tx, ty, tx, s * 0.88);
  prismGrad.addColorStop(0, '#a855f7');
  prismGrad.addColorStop(1, '#6d28d9');

  ctx.beginPath();
  ctx.moveTo(tx, ty);
  ctx.lineTo(br.x, br.y);
  ctx.lineTo(bl.x, bl.y);
  ctx.closePath();
  ctx.fillStyle = prismGrad;
  ctx.fill();
  ctx.strokeStyle = '#c084fc';
  ctx.lineWidth = s * 0.02;
  ctx.stroke();

  // Spectrum rays from bottom-right corner
  const rays = [
    { dy: -s * 0.40, color: '#ef4444' },
    { dy: -s * 0.25, color: '#f97316' },
    { dy: -s * 0.12, color: '#eab308' },
    { dy:  s * 0.02, color: '#22c55e' },
    { dy:  s * 0.14, color: '#38bdf8' },
  ];

  ctx.lineWidth = s * 0.045;
  ctx.lineCap = 'round';
  rays.forEach(({ dy, color }) => {
    ctx.beginPath();
    ctx.moveTo(br.x, br.y);
    ctx.lineTo(s + s * 0.05, br.y + dy);
    ctx.strokeStyle = color;
    ctx.stroke();
  });
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function download(canvas, name) {
  const a = document.createElement('a');
  a.download = name;
  a.href = canvas.toDataURL('image/png');
  a.click();
}

function generateAll() {
  const c48 = document.getElementById('c48');
  const c128 = document.getElementById('c128');
  drawIcon(c48);
  drawIcon(c128);
  setTimeout(() => {
    download(c48, 'icon48.png');
    setTimeout(() => download(c128, 'icon128.png'), 300);
  }, 100);
}

window.onload = () => {
  drawIcon(document.getElementById('c48'));
  drawIcon(document.getElementById('c128'));
};
</script>
</body>
</html>
